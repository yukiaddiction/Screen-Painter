<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <clipPath id="splashPictureClip">
            <rect x="166" y="184" width="124" height="88" rx="8" ry="8" />
        </clipPath>
    </defs>

    <!-- Circular rotate arrow (auto-rotating wallpapers) -->
    <path d="M 288 124 A 120 120 0 1 1 168 124" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
    <polygon points="194,109 177,140 159,108" fill="#ffffff" />

    <!-- Photo frame (white matte) -->
    <rect x="150" y="168" width="156" height="120" rx="16" ry="16" fill="#ffffff" />

    <!-- Picture area (teal sky shows through) -->
    <rect x="166" y="184" width="124" height="88" rx="8" ry="8" fill="#5AC3B6" />

    <!-- Sun + mountains inside the picture -->
    <g clip-path="url(#splashPictureClip)">
        <circle cx="196" cy="206" r="14" fill="#ffffff" />
        <polygon points="160,272 200,228 224,250 258,206 296,248 296,276 160,276" fill="#ffffff" />
    </g>
</svg>
